query QueryModels {
  models {
    id
    name
    description
    url
    sizeMb
    kind
    tier
    isDefault
    destinationPath
    installed
  }
}

query QueryActiveDownloads {
  activeDownloads {
    id
    catalogueId
    state
    bytesReceived
    totalBytes
    speedBytesPerSecond
    errorMessage
    startedAt
  }
}

mutation MutationDownloadModel($catalogueId: String!) {
  downloadModel(catalogueId: $catalogueId) {
    downloadId
    errors {
      code
      message
    }
  }
}

mutation MutationCancelModelDownload($downloadId: String!) {
  cancelModelDownload(downloadId: $downloadId) {
    ok
    errors {
      code
      message
    }
  }
}

subscription SubscriptionModelDownloadProgress($downloadId: String!) {
  modelDownloadProgress(downloadId: $downloadId) {
    downloadId
    bytesRead
    totalBytes
    phase
    speedBytesPerSecond
    error
  }
}
