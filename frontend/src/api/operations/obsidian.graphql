query QueryObsidianDetect {
  obsidianDetect {
    detected {
      path
      name
    }
    searched
  }
}

mutation MutationSetupObsidian($vaultPath: String) {
  setupObsidian(vaultPath: $vaultPath) {
    report {
      vaultPath
      createdPaths
      skippedPaths
    }
    errors {
      code
      message
    }
  }
}
