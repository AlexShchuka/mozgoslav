query QueryProfiles {
  profiles {
    id
    name
    systemPrompt
    transcriptionPromptOverride
    outputTemplate
    cleanupLevel
    exportFolder
    autoTags
    isDefault
    isBuiltIn
    glossaryByLanguage {
      language
      terms
    }
    llmCorrectionEnabled
    llmProviderOverride
    llmModelOverride
  }
}

mutation MutationCreateProfile($input: CreateProfileInput!) {
  createProfile(input: $input) {
    profile {
      id
      name
      systemPrompt
      transcriptionPromptOverride
      outputTemplate
      cleanupLevel
      exportFolder
      autoTags
      isDefault
      isBuiltIn
      glossaryByLanguage {
        language
        terms
      }
      llmCorrectionEnabled
      llmProviderOverride
      llmModelOverride
    }
    errors {
      code
      message
    }
  }
}

mutation MutationUpdateProfile($id: UUID! $input: CreateProfileInput!) {
  updateProfile(id: $id input: $input) {
    profile {
      id
      name
      systemPrompt
      transcriptionPromptOverride
      outputTemplate
      cleanupLevel
      exportFolder
      autoTags
      isDefault
      isBuiltIn
      glossaryByLanguage {
        language
        terms
      }
      llmCorrectionEnabled
      llmProviderOverride
      llmModelOverride
    }
    errors {
      code
      message
    }
  }
}

mutation MutationDeleteProfile($id: UUID!) {
  deleteProfile(id: $id) {
    profile {
      id
    }
    errors {
      code
      message
    }
  }
}

mutation MutationDuplicateProfile($id: UUID!) {
  duplicateProfile(id: $id) {
    profile {
      id
      name
      systemPrompt
      transcriptionPromptOverride
      outputTemplate
      cleanupLevel
      exportFolder
      autoTags
      isDefault
      isBuiltIn
      glossaryByLanguage {
        language
        terms
      }
      llmCorrectionEnabled
      llmProviderOverride
      llmModelOverride
    }
    errors {
      code
      message
    }
  }
}

query SuggestGlossaryTerms($profileId: UUID!, $language: String!) {
  suggestGlossaryTerms(profileId: $profileId, language: $language)
}
