query QueryRag($question: String!, $topK: Int) {
  ragQuery(question: $question, topK: $topK) {
    answer
    citations {
      noteId
      segmentId
      text
      snippet
    }
    llmAvailable
  }
}

mutation MutationRagReindex {
  ragReindex {
    embeddedNotes
    chunks
    errors {
      code
      message
    }
  }
}
