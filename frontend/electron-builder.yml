appId: com.mozgoslav.app
productName: Mozgoslav
copyright: Mozgoslav
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}
  hardenedRuntime: false
  gatekeeperAssess: false
dmg:
  icon: build/icon.icns
  iconSize: 100
  contents:
    - x: 380
      y: 240
      type: link
      path: /Applications
    - x: 122
      y: 240
      type: file
asar: true
