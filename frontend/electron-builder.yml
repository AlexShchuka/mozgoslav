appId: com.mozgoslav.app
productName: Mozgoslav
copyright: Mozgoslav
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
extraResources:
  # The push-to-talk helper is built separately on macOS CI
  # (helpers/MozgoslavDictationHelper, `swift build -c release`) and copied
  # into the app bundle as a resource. Electron main spawns it at runtime.
  - from: ../helpers/MozgoslavDictationHelper/.build/release/mozgoslav-dictation-helper
    to: mozgoslav-dictation-helper
    filter: ["**/*"]
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}
  hardenedRuntime: false
  gatekeeperAssess: false
dmg:
  iconSize: 100
  contents:
    - x: 380
      y: 240
      type: link
      path: /Applications
    - x: 122
      y: 240
      type: file
asar: true
