appId: com.mozgoslav.app
productName: Mozgoslav
copyright: Mozgoslav
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}
  hardenedRuntime: false
  gatekeeperAssess: false
  icon: build/icon.icns
  extendInfo:
    CFBundleName: Mozgoslav
    CFBundleDisplayName: Mozgoslav
    CFBundleIconFile: icon.icns
    CFBundleIconName: icon
    LSApplicationCategoryType: public.app-category.productivity
    NSHighResolutionCapable: true
    NSMicrophoneUsageDescription: Mozgoslav records dictation audio captured through your microphone.
    NSSupportsAutomaticGraphicsSwitching: true
  extraResources:
    # Plan v0.8 Block 7 — Tier-1 bundle models. Populated by
    # scripts/fetch-bundle-models.sh before electron-builder runs.
    - from: build/bundle-models
      to: bundle-models
      filter: [ "**/*" ]
    # Push-to-talk helper — built from native/MozgoslavDictationHelper
    # via `swift build -c release` on macOS CI and copied into the bundle.
    - from: ../native/MozgoslavDictationHelper/.build/release/mozgoslav-dictation-helper
      to: mozgoslav-dictation-helper
      filter: [ "**/*" ]
    # Syncthing binaries — populated by scripts/fetch-syncthing.sh (ADR-003 D4).
    # Both darwin archs are bundled so universal builds and cross-arch
    # dev iteration work without extra plumbing. Runtime selection is
    # handled by electron/utils/syncthingLauncher.ts.
    - from: resources/syncthing/darwin-arm64
      to: syncthing/darwin-arm64
      filter: [ "**/*" ]
    - from: resources/syncthing/darwin-amd64
      to: syncthing/darwin-amd64
      filter: [ "**/*" ]
win:
  extraResources:
    - from: resources/syncthing/windows-amd64
      to: syncthing/windows-amd64
      filter: [ "**/*" ]
linux:
  extraResources:
    - from: resources/syncthing/linux-amd64
      to: syncthing/linux-amd64
      filter: [ "**/*" ]
    - from: resources/syncthing/linux-arm64
      to: syncthing/linux-arm64
      filter: [ "**/*" ]
dmg:
  iconSize: 100
  contents:
    - x: 380
      y: 240
      type: link
      path: /Applications
    - x: 122
      y: 240
      type: file
asar: true
