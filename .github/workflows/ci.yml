name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Secret scan first so if a PAT / key slipped past the lefthook pre-push the
  # build fails fast, before burning minutes on backend/frontend matrices.
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 lets gitleaks diff the full branch history on PRs,
          # matching what the local pre-push hook sees.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend (.NET ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      # ffmpeg powers FfmpegPcmDecoder (decodes Opus-in-WebM dictation chunks
      # into 16 kHz float32 mono PCM) and FfmpegAudioConverter. Integration
      # tests exercise the real binary — installing it explicitly keeps CI
      # deterministic across runner image updates.
      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg
      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - name: Restore
        run: dotnet restore backend/Mozgoslav.sln -maxcpucount:1
      - name: Build
        run: dotnet build backend/Mozgoslav.sln -maxcpucount:1 --no-restore -warnaserror
      - name: Test
        run: dotnet test backend/Mozgoslav.sln -maxcpucount:1 --no-build --nologo --verbosity normal

  frontend:
    name: Frontend (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Typecheck
        run: cd frontend && npm run typecheck
      - name: Lint
        run: cd frontend && npm run lint
      - name: Test
        run: cd frontend && npm test -- --watchAll=false
      - name: Build
        run: cd frontend && WATCHPACK_POLLING=true npm run build

  python:
    name: Python sidecar (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          cd python-sidecar
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          # requirements-dev.txt is intentionally a lighter superset of
          # requirements.txt (no transformers / no sentence-transformers).
          # Tier-2 endpoints are covered via ModelNotAvailableError paths;
          # the heavy production wheels ship only in the DMG bundle.
          pip install -r requirements-dev.txt
      - name: Ruff
        run: cd python-sidecar && source .venv/bin/activate && ruff check .
      - name: Pytest
        run: cd python-sidecar && source .venv/bin/activate && pytest

  dictation-helper:
    name: Dictation helper (macOS Swift)
    # The helper links AppKit / AVFoundation / ApplicationServices (macOS-only),
    # so we only build and test it on a macOS runner. Core JSON-RPC / strategy
    # logic still has unit coverage on the same runner.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cd helpers/MozgoslavDictationHelper && swift build -c release
      - name: Test
        run: cd helpers/MozgoslavDictationHelper && swift test
