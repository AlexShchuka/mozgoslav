name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (.NET ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore backend/Mozgoslav.sln -maxcpucount:1
      - name: Build
        run: dotnet build backend/Mozgoslav.sln -maxcpucount:1 --no-restore -warnaserror
      - name: Test
        run: dotnet test backend/Mozgoslav.sln -maxcpucount:1 --no-build --nologo --verbosity normal

  frontend:
    name: Frontend (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Typecheck
        run: cd frontend && npm run typecheck
      - name: Lint
        run: cd frontend && npm run lint
      - name: Test
        run: cd frontend && npm test -- --watchAll=false
      - name: Build
        run: cd frontend && WATCHPACK_POLLING=true npm run build

  python:
    name: Python sidecar (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          cd python-sidecar
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff
        run: cd python-sidecar && source .venv/bin/activate && ruff check .
      - name: Pytest
        run: cd python-sidecar && source .venv/bin/activate && pytest
