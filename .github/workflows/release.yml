name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify Swift toolchain
        run: swift --version

      - name: Fetch Tier-1 bundle models
        run: bash scripts/fetch-bundle-models.sh

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build DMG
        working-directory: frontend
        run: npm run dist:mac

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mozgoslav-${{ github.ref_name }}-arm64-dmg
          path: frontend/release/*.dmg
          if-no-files-found: error

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/release/*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
