name: Backlog item
description: A deferred work item with problem, proposal, and acceptance criteria
title: "[feature] short-slug"
labels:
  - type/backlog
body:
  - type: dropdown
    id: feature
    attributes:
      label: Feature area
      description: Scope label (the label `feature/<value>` will be applied automatically).
      options:
        - api
        - dictation
        - distribution
        - meetings
        - observability
        - obsidian
        - opencode
        - persistence
        - profiles
        - rag
        - recording
        - sync
        - testing
        - tooling
        - ui
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What is true in the codebase today that makes this item exist. Concept-level, no file paths.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Bullet list of concrete failures or gaps caused by the current state.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Concept-level solution. Bullets. No file paths in the body.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      description: Checklist of observable outcomes that mark this as done.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: rejected
    attributes:
      label: Rejected alternatives
      description: Optional. Alternative approaches considered and why they were dropped.
