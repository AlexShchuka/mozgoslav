name: Backlog item
description: A deferred work item with problem, proposal, and acceptance criteria
title: "[feature] short-slug"
labels:
  - type/backlog
body:
  - type: dropdown
    id: feature
    attributes:
      label: Feature area
      description: Scope label (the label `feature/<value>` will be applied automatically).
      options:
        - agents
        - api
        - dictation
        - distribution
        - mcp
        - observability
        - obsidian
        - persistence
        - profiles
        - prompt-builder
        - rag
        - recording
        - sync
        - system-action
        - testing
        - tooling
        - ui
        - web-search
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What is true in the codebase today that makes this item exist. Concept-level, no file paths.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Bullet list of concrete failures or gaps caused by the current state.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Concept-level solution. Bullets. No file paths in the body.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      description: Checklist of observable outcomes that mark this as done. Each item must be verifiable by a human or automated check, with no ambiguity.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: test_plan
    attributes:
      label: Test plan
      description: |
        Enumerate every business case the implementation must cover. Use stable TC ids (`TC-B01`, `TC-G02`, `TC-F09a`) so test method names can grep back to this issue. Group by layer (backend unit / integration / frontend / observability). Include at least: happy path, every error path the feature exposes, idempotency, concurrency, regression for each open bug the issue closes. Tests must be written upfront, not as follow-up work.
      value: |
        **Backend unit (`backend/tests/Mozgoslav.Tests/`):**
        - [ ] TC-B01 — happy path
        - [ ] TC-B02 — …

        **Backend integration (`backend/tests/Mozgoslav.Tests.Integration/`):**
        - [ ] TC-G01 — …

        **Frontend (`frontend/src/**/__tests__/`):**
        - [ ] TC-F01 — …

        **Observability / runbook:**
        - [ ] TC-M01 — …
    validations:
      required: false

  - type: textarea
    id: rejected
    attributes:
      label: Rejected alternatives
      description: Optional. Alternative approaches considered and why they were dropped.
