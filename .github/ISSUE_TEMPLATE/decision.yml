name: Architectural decision (shipped)
description: Robot-style record of a shipped architectural change — concept-level, no file paths.
title: "[feature] decision-slug"
labels:
  - type/decision
body:
  - type: dropdown
    id: feature
    attributes:
      label: Feature area
      description: Scope label (the label `feature/<value>` will be applied automatically).
      options:
        - agents
        - api
        - dictation
        - distribution
        - mcp
        - observability
        - obsidian
        - persistence
        - profiles
        - prompt-builder
        - rag
        - recording
        - sync
        - system-action
        - testing
        - tooling
        - ui
        - web-search
    validations:
      required: true

  - type: textarea
    id: decision
    attributes:
      label: Decision
      description: Single bullet that captures the shipped choice.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Forces and constraints that shaped the decision.
    validations:
      required: true

  - type: textarea
    id: consequences
    attributes:
      label: Consequences
      description: Bullets. What this decision enables, forbids, and defers.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives rejected
      description: Optional. Table or bullets — `alt → reason`.

  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: |
        How is this decision proven? Reference the regression test or assertion (`TC-Bxx` / `TC-Gxx` / `TC-Fxx`) that would catch a regression. Decisions without a verifying test rot silently — call this out explicitly if no test is feasible (e.g. policy decisions).
    validations:
      required: false
